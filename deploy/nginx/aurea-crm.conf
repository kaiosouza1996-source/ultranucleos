# Nginx — Ultra Nucleos (Áurea Investing CRM) — VPS Hostinger
#
# Serve o frontend (build estático em /var/www/aurea-crm/dist) e faz proxy
# reverso do whatsapp-engine (Node, porta 8787) — incluindo WebSocket.
#
# Basic Auth cobre O SITE INTEIRO (front + engine) — camada de infraestrutura,
# independente do login de verdade (Supabase Auth) que fica dentro da aplicação.
# As duas coisas ficam juntas: Basic Auth impede que alguém sem a senha do Nginx
# sequer carregue o HTML/JS; o login do Supabase controla quem faz o quê dentro
# do CRM depois disso.
#
# Instalação (rodar uma vez na VPS):
#   sudo apt update && sudo apt install -y nginx apache2-utils
#   sudo htpasswd -c /etc/nginx/.htpasswd SEU_USUARIO      # cria o arquivo de senha
#   sudo htpasswd /etc/nginx/.htpasswd OUTRO_USUARIO       # adiciona mais usuários (sem -c)
#   sudo cp aurea-crm.conf /etc/nginx/sites-available/aurea-crm.conf
#   sudo ln -s /etc/nginx/sites-available/aurea-crm.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS (item 4 — Let's Encrypt): depois que o DNS do domínio já estiver
# apontando pra VPS e o bloco HTTP abaixo estiver funcionando:
#   sudo apt install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d SEU_DOMINIO
# O certbot edita este arquivo automaticamente, adicionando os diretivas
# "listen 443 ssl;" e os caminhos dos certificados — não precisa escrever isso
# manualmente aqui.

server {
    listen 80;
    listen [::]:80;
    server_name SEU_DOMINIO; # ex: crm.aureainvesting.com.br — troque antes de ativar

    # ── Basic Auth — protege TUDO (frontend + API do engine) ──────────────
    auth_basic "Área restrita — Áurea Investing";
    auth_basic_user_file /etc/nginx/.htpasswd;

    client_max_body_size 25m; # mídias (imagem/áudio) enviadas via /send-media

    # ── WebSocket do whatsapp-engine ───────────────────────────────────────
    location /ws {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s; # mantém a conexão viva por muito tempo
    }

    # ── REST do whatsapp-engine (contatos, conversas, envio, mídia) ────────
    # Ajuste o prefixo /engine/ para bater com VITE_ENGINE_URL no frontend
    # (ex: https://SEU_DOMINIO/engine).
    location /engine/ {
        proxy_pass http://127.0.0.1:8787/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Frontend (build estático do Vite) ──────────────────────────────────
    root /var/www/aurea-crm/dist;
    index index.html;
    location / {
        try_files $uri /index.html;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
